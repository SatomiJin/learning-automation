[tool:pytest]
# Basic configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Playwright specific
addopts =
    --browser chromium
    --headed
    --slowmo 500
    --video retain-on-failure
    --screenshot only-on-failure
    --html=reports/report.html
    --self-contained-html
    --tb=short
    --strict-markers

# Markers for different test types
markers =
    smoke: Quick smoke tests (run first)
    regression: Full regression suite
    slow: Tests that take >30 seconds
    api: API-only tests
    ui: UI-only tests
    critical: Critical path tests
    integration: Integration tests

# Filtering
# Run only smoke tests: pytest -m smoke
# Run everything except slow: pytest -m "not slow"
# Run specific file: pytest tests/test_login.py
# Run with verbose output: pytest -v
# Run with parallel: pytest -n 4 (requires pytest-xdist)

# Coverage (optional)
# addopts = --cov=src --cov-report=html --cov-report=term

# Allure reporting (uncomment when installed)
# addopts = --alluredir=./allure-results
# Run with: pytest && allure serve ./allure-results